  <style>
    /* VIEW TRANSITION */
    @view-transition { navigation: auto; }
    ::view-transition-old(root) { animation: 0.3s cubic-bezier(0.4, 0, 0.2, 1) both fade-out; }
    ::view-transition-new(root) { animation: 0.3s cubic-bezier(0.4, 0, 0.2, 1) both fade-in; }
    @keyframes fade-out { to { opacity: 0; } }
    @keyframes fade-in { from { opacity: 0; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0E0C;
      --bg-elevated: #1A1916;
      --bg-card: #1E1D1A;
      --surface: #2A2926;
      --border: rgba(245,243,238,0.08);
      --border-hover: rgba(245,243,238,0.15);
      --text: #F5F3EE;
      --text-secondary: rgba(245,243,238,0.6);
      --text-muted: rgba(245,243,238,0.35);
      --amber: #C67B2E;
      --amber-glow: rgba(198,123,46,0.15);
      --gold: #D4A233;
      --coral: #B84A3C;
      --teal: #156967;
      --teal-bright: #1A8583;
      --green: #3A7D44;
      --red: #C0392B;
      --blue: #2E86C1;
      --purple: #7D3C98;
      --font-heading: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-pixel: 'Press Start 2P', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--amber); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px; }

    /* BACK NAV */
    .back-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(15,14,12,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .back-nav a {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      transition: color 0.2s;
    }
    .back-nav a:hover { color: var(--amber); text-decoration: none; }

    /* GAME WRAPPER */
    #game-wrapper {
      position: relative;
      width: 800px;
      max-width: calc(100vw - 32px);
      aspect-ratio: 4/3;
      border: 2px solid var(--border-hover);
      border-radius: 12px;
      overflow: hidden;
      background: #0a0908;
      box-shadow: 0 0 60px rgba(198,123,46,0.06), 0 24px 48px rgba(0,0,0,0.4);
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* HUD OVERLAY */
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: none;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    #hud.active { display: flex; }

    .hud-panel {
      background: rgba(15,14,12,0.85);
      border: 1px solid var(--border-hover);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: var(--font-pixel);
      font-size: 8px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
    }
    .hud-stat { color: var(--text-secondary); }
    .hud-stat span { color: var(--text); }
    .hp-color { color: var(--green); }
    .mp-color { color: var(--blue); }
    .lv-color { color: var(--gold); }
    .room-label {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    #mute-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      color: var(--amber);
      transition: opacity 0.2s, transform 0.1s;
      font-family: system-ui;
    }
    #mute-btn:hover { opacity: 0.8; }
    #mute-btn:active { transform: scale(0.9); }

      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,14,12,0.92);
      border-top: 2px solid var(--amber);
      padding: 12px 16px;
      display: none;
      z-index: 20;
      backdrop-filter: blur(8px);

      font-size: 9px;
      color: var(--text);
      margin-bottom: 10px;
      min-height: 24px;
      line-height: 1.6;

    .combat-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;

    .combat-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .combat-btn:hover, .combat-btn:focus-visible {
      background: var(--amber);
      color: var(--bg);
      border-color: var(--amber);

      opacity: 0.3;
      cursor: not-allowed;
      background: var(--surface);

      align-items: center;
      gap: 8px;
      margin-bottom: 8px;

    .enemy-name {

      font-size: 8px;
      color: var(--coral);

    .hp-bar-bg {

      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;

    .hp-bar-fill {

      background: var(--coral);
      border-radius: 4px;
      transition: width 0.3s ease;

      bottom: 0;
      left: 0;
      right: 0;

      z-index: 20;
      backdrop-filter: blur(8px);

    .dialogue-speaker {

      font-size: 8px;
      color: var(--teal-bright);
      margin-bottom: 6px;

    .dialogue-text {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--text);
      line-height: 1.8;
    }
    .dialogue-hint {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--text-muted);
      margin-top: 8px;

    /* NOTIFICATION */
    #notification {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15,14,12,0.9);
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 12px 20px;
      font-family: var(--font-pixel);
      font-size: 9px;
      color: var(--gold);
      text-align: center;
      display: none;
      z-index: 30;
      pointer-events: none;
      line-height: 1.6;
    }
    #notification.active { display: block; }

    /* CONTROLS HINT */
    .controls-hint {
      margin-top: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
    .controls-hint kbd {
      display: inline-block;
      padding: 2px 6px;
      background: var(--surface);
      border: 1px solid var(--border-hover);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-secondary);
    }

    /* MOBILE */
    #mobile-dpad {
      display: none;
      margin-top: 12px;
      gap: 4px;
    }
    .dpad-row {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .dpad-btn {
      width: 52px;
      height: 52px;
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: 8px;
      color: var(--text);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dpad-btn:active { background: var(--amber); color: var(--bg); }
    .dpad-spacer { width: 52px; height: 52px; }

    @media (pointer: coarse) {
      #mobile-dpad { display: grid; }
      .controls-hint { display: none; }
    }

    @media (max-width: 640px) {
      #game-wrapper { border-radius: 8px; }
      .hud-panel { font-size: 7px; padding: 6px 8px; }
      .combat-msg { font-size: 8px; }
      .combat-btn { font-size: 7px; padding: 6px 12px; }
    }

    /* REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

// ============================================================
// WEB AUDIO API (Ambient Sound)
// ============================================================
function initAudio() {
  if (!audioContext) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.log('Web Audio API not supported');
      return false;
    }
  }
  return true;
}

function playAmbientSound(frequency, volume) {
  if (!audioContext) return;
  if (isMuted) return;

  try {
    if (ambientOscillator) ambientOscillator.stop();
    if (ambientGain) ambientGain.gain.setValueAtTime(0, audioContext.currentTime);
  } catch (e) {}

  var now = audioContext.currentTime;
  ambientOscillator = audioContext.createOscillator();
  ambientGain = audioContext.createGain();

  ambientOscillator.type = 'sine';
  ambientOscillator.frequency.setValueAtTime(frequency, now);
  ambientOscillator.connect(ambientGain);
  ambientGain.connect(audioContext.destination);
  ambientGain.gain.setValueAtTime(volume || 0.05, now);

  ambientOscillator.start(now);
}

function stopAmbientSound() {
  if (ambientOscillator && audioContext) {
    try {
      ambientGain.gain.setValueAtTime(0, audioContext.currentTime);
      ambientOscillator.stop(audioContext.currentTime + 0.1);
    } catch (e) {}
    ambientOscillator = null;
  }
}

function toggleMute() {
  isMuted = !isMuted;
  var btn = document.getElementById('mute-btn');
  if (btn) {
    btn.textContent = isMuted ? '🔇' : '🔊';
  }
  if (isMuted) {
    stopAmbientSound();
  } else if (gameState === STATE.COMBAT) {
    playAmbientSound(120, 0.08);
  } else if (gameState === STATE.EXPLORE) {
    playAmbientSound(55, 0.05);
  }
}

function spawnAmbientParticles(roomName) {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    return;
  }
  ambientParticles = [];
  var colors = [];
  var count = 18;
  if (roomName === 'lab') {
    colors = [C.amber, 'rgba(198,123,46,0.4)', 'rgba(198,123,46,0.3)'];
  } else if (roomName === 'testing') {
    colors = [C.blue, 'rgba(46,134,193,0.4)', 'rgba(46,134,193,0.3)'];
  } else if (roomName === 'audit') {
    colors = [C.purple, 'rgba(125,60,152,0.4)', 'rgba(125,60,152,0.3)'];
  }
  for (var i = 0; i < count; i++) {
    ambientParticles.push({
      x: Math.random() * 640,
      y: Math.random() * 480,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.2,
      life: 0.5 + Math.random() * 0.5,
      color: colors[i % colors.length],
      size: 1 + Math.random() * 2,
      maxLife: 0.5 + Math.random() * 0.5
    });
  }
}

function updateAmbientParticles() {
  for (var i = ambientParticles.length - 1; i >= 0; i--) {
    var p = ambientParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.002;
    if (p.life <= 0) {
      ambientParticles[i] = {
        x: Math.random() * 640,
        y: Math.random() * 480,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.2,
        life: 0.5 + Math.random() * 0.5,
        color: p.color,
        size: 1 + Math.random() * 2,
        maxLife: 0.5 + Math.random() * 0.5
      };
    }
  }
}

function drawAmbientParticles() {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    var opacity = Math.min(p.life, 1);
    var colorWithAlpha = p.color.replace('0.3', (0.15 * opacity).toFixed(2)).replace('0.4', (0.2 * opacity).toFixed(2));
    ctx.fillStyle = colorWithAlpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnParticles(x, y, color, count, spread) {
  spread = spread || 40;
  for (var i = 0; i < (count || 6); i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * spread * 0.15,
      vy: (Math.random() - 0.8) * spread * 0.12,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 2 + Math.random() * 3,
      color: color
    });
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1, vy: -1.2 });
}

function shakeScreen(intensity, duration) {
  screenShake.intensity = intensity;
  screenShake.duration = duration;
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var j = floatingTexts.length - 1; j >= 0; j--) {
    var ft = floatingTexts[j];
    ft.y += ft.vy;
    ft.life -= 0.015;
    if (ft.life <= 0) floatingTexts.splice(j, 1);
  }
  if (screenShake.duration > 0) {
    screenShake.duration--;
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
  }
  updateAmbientParticles();
  if (fadeDirection !== 0) {
    fadeAlpha += fadeDirection * 0.06;
    if (fadeAlpha >= 1 && fadeDirection === 1) {
      fadeAlpha = 1;
      fadeDirection = -1;
    } else if (fadeAlpha <= 0 && fadeDirection === -1) {
      fadeAlpha = 0;
      fadeDirection = 0;
    }
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var j = 0; j < floatingTexts.length; j++) {
    var ft = floatingTexts[j];
    ctx.globalAlpha = ft.life;
    ctx.font = 'bold 11px "Press Start 2P", monospace';
    ctx.fillStyle = '#0F0E0C';
    ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawPixelChar(x, y, skinColor, hairColor, shirtColor, pantsColor, dir, frame) {
  var px = x * TILE;
  var py = y * TILE;
  var t = performance.now() / 400;
  var bobY = Math.sin(t + x * 0.5) * 1.5;
  var walkBob = (frame % 2 === 0) ? 0 : -1;
  bobY += walkBob;

  // Shadow (soft ellipse)
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(px + 16, py + 30, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tiny legs (chibi = stubby)
  ctx.fillStyle = pantsColor;
  var legSpread = (frame % 2 === 0) ? 0 : 1;
  ctx.fillRect(px + 9 - legSpread, py + 24 + bobY, 5, 6);
  ctx.fillRect(px + 18 + legSpread, py + 24 + bobY, 5, 6);
  // Shoes
  ctx.fillStyle = '#3D2B1F';
  ctx.fillRect(px + 8 - legSpread, py + 28 + bobY, 6, 3);
  ctx.fillRect(px + 17 + legSpread, py + 28 + bobY, 7, 3);

  // Body (round and compact)
  ctx.fillStyle = shirtColor;
  roundRect(px + 7, py + 16 + bobY, 18, 10, 3);

  // Arms
  var armSwing = Math.sin(frame * Math.PI) * 2;
  ctx.fillStyle = shirtColor;
  ctx.fillRect(px + 4, py + 17 + bobY + armSwing, 4, 7);
  ctx.fillRect(px + 24, py + 17 + bobY - armSwing, 4, 7);
  // Hands
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(px + 6, py + 25 + bobY + armSwing, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + 26, py + 25 + bobY - armSwing, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Head (big round chibi head)
  ctx.fillStyle = skinColor;
  roundRect(px + 5, py + 1 + bobY, 22, 17, 6);

  // Hair
  ctx.fillStyle = hairColor;
  roundRect(px + 4, py - 1 + bobY, 24, 9, 5);
  // Side hair
  if (dir === 'left' || dir === 'down') ctx.fillRect(px + 4, py + 5 + bobY, 4, 6);
  if (dir === 'right' || dir === 'down') ctx.fillRect(px + 24, py + 5 + bobY, 4, 6);
  // Hair tuft
  ctx.fillRect(px + 12, py - 3 + bobY, 4, 4);
  ctx.fillRect(px + 17, py - 2 + bobY, 3, 3);

  // Face
  if (dir !== 'up') {
    // Eyes (big expressive chibi eyes)
    var eyeOffX = dir === 'left' ? -2 : dir === 'right' ? 2 : 0;
    // Eye whites
    ctx.fillStyle = '#FFFFFF';
    roundRect(px + 8 + eyeOffX, py + 7 + bobY, 7, 6, 2);
    roundRect(px + 17 + eyeOffX, py + 7 + bobY, 7, 6, 2);
    // Pupils (big, cute)
    ctx.fillStyle = '#1A1916';
    ctx.beginPath();
    ctx.arc(px + 12 + eyeOffX, py + 10 + bobY, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + 21 + eyeOffX, py + 10 + bobY, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine (sparkle!)
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(px + 11 + eyeOffX, py + 8 + bobY, 2, 2);
    ctx.fillRect(px + 20 + eyeOffX, py + 8 + bobY, 2, 2);

    // Blush (cute pink cheeks)
    ctx.fillStyle = 'rgba(255,150,150,0.3)';
    ctx.beginPath();
    ctx.ellipse(px + 8, py + 13 + bobY, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px + 24, py + 13 + bobY, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mouth (tiny happy line)
    ctx.fillStyle = '#C07060';
    if (dir === 'down') {
      ctx.fillRect(px + 14, py + 14 + bobY, 4, 1);
      ctx.fillRect(px + 13, py + 13 + bobY, 1, 1);
      ctx.fillRect(px + 18, py + 13 + bobY, 1, 1);
    } else {
      ctx.fillRect(px + 14 + eyeOffX, py + 14 + bobY, 3, 1);
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

    ctx.arc(px + 16, py + 22 + bob, 4, Math.PI * 0.2, Math.PI * 0.8);
    ctx.stroke();
    // Tiny feet
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(px + 9, py + 27 + bob, 5, 3);
    ctx.fillRect(px + 18, py + 27 + bob, 5, 3);
  } else if (isBoss) {
    // FDA Inspector: stern person in suit
    // Body (suit)
    ctx.fillStyle = '#1A1A2E';
    roundRect(px + 6, py + 16 + bob, 20, 12, 3);
    // Tie
    ctx.fillStyle = C.red;
    ctx.beginPath();
    ctx.moveTo(px + 16, py + 16 + bob);
    ctx.lineTo(px + 14, py + 24 + bob);
    ctx.lineTo(px + 18, py + 24 + bob);
    ctx.closePath();
    ctx.fill();
    // Head
    ctx.fillStyle = '#E8C8A0';
    roundRect(px + 8, py + 2 + bob, 16, 15, 5);
    // Glasses (stern!)
    ctx.strokeStyle = '#4A4A4A';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px + 9, py + 7 + bob, 6, 5);
    ctx.strokeRect(px + 17, py + 7 + bob, 6, 5);
    ctx.beginPath();
    ctx.moveTo(px + 15, py + 9 + bob);
    ctx.lineTo(px + 17, py + 9 + bob);
    ctx.stroke();
    // Eyes behind glasses
    ctx.fillStyle = '#1A1916';
    ctx.fillRect(px + 11, py + 9 + bob, 2, 2);
    ctx.fillRect(px + 19, py + 9 + bob, 2, 2);
    // Flat stern mouth
    ctx.fillStyle = '#8B6060';
    ctx.fillRect(px + 13, py + 14 + bob, 6, 1);
    // Hair (neat)
    ctx.fillStyle = '#3A3A3A';
    roundRect(px + 7, py + 0 + bob, 18, 6, 4);
    // Clipboard in hand
    ctx.fillStyle = '#D4A233';
    ctx.fillRect(px + 24, py + 17 + bob, 6, 8);
    ctx.fillStyle = '#F5E6CC';
    ctx.fillRect(px + 25, py + 19 + bob, 4, 5);
    // Tiny red marks on clipboard
    ctx.fillStyle = C.red;
    ctx.fillRect(px + 26, py + 20 + bob, 2, 1);
    ctx.fillRect(px + 26, py + 22 + bob, 2, 1);
    // Legs
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(px + 9, py + 26 + bob, 5, 5);
    ctx.fillRect(px + 18, py + 26 + bob, 5, 5);
    // Shoes
    ctx.fillStyle = '#1A1916';
    ctx.fillRect(px + 8, py + 29 + bob, 6, 3);
    ctx.fillRect(px + 17, py + 29 + bob, 7, 3);
  } else {
    // Fallback generic enemy
    ctx.fillStyle = color;
    var bodyW = 18;
    var bodyH = 16;
    roundRect(px + (TILE - bodyW)/2, py + (TILE - bodyH)/2 + bob, bodyW, bodyH, 5);
    ctx.fillStyle = C.white;
    ctx.beginPath(); ctx.arc(px + 12, py + 13 + bob, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 20, py + 13 + bob, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0F0E0C';
    ctx.beginPath(); ctx.arc(px + 13, py + 13 + bob, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 21, py + 13 + bob, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawChest(x, y, opened) {
  var px = x * TILE;
  var py = y * TILE;
  var t = performance.now() / 800;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px + 16, py + 30, 10, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  if (!opened) {
    // Sparkle effect
    var sparkle = Math.sin(t * 3) * 0.5 + 0.5;
    ctx.fillStyle = 'rgba(212,162,51,' + (sparkle * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(px + 16, py + 12, 18 * sparkle, 0, Math.PI * 2);
    ctx.fill();
  }

  // Base
  ctx.fillStyle = opened ? C.chestDark : C.chest;
  roundRect(px + 4, py + 14, 24, 14, 3);
  // Stripe
  ctx.fillStyle = C.chestDark;
  ctx.fillRect(px + 4, py + 14, 24, 3);
  // Metal bands
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(px + 4, py + 20, 24, 2);

  if (!opened) {
    // Lid (rounded)
    ctx.fillStyle = C.chest;
    roundRect(px + 3, py + 6, 26, 10, 4);
    ctx.fillStyle = C.chestDark;
    ctx.fillRect(px + 3, py + 6, 26, 2);
    // Lock (heart-shaped because cute)
    ctx.fillStyle = C.amber;
    ctx.beginPath();
    ctx.arc(px + 14, py + 12, 3, 0, Math.PI * 2);
    ctx.arc(px + 18, py + 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px + 11, py + 13);
    ctx.lineTo(px + 16, py + 18);
    ctx.lineTo(px + 21, py + 13);
    ctx.fill();
  } else {
    // Open lid (tilted back)
    ctx.fillStyle = C.chestDark;
    roundRect(px + 3, py + 1, 26, 6, 3);
    // Sparkle from inside
    ctx.fillStyle = 'rgba(212,162,51,0.5)';
    ctx.fillRect(px + 7, py + 15, 18, 8);
    // Star particles
    var s1 = Math.sin(t * 4);
    var s2 = Math.cos(t * 3);
    ctx.fillStyle = C.gold;
    ctx.fillRect(px + 10 + s1 * 3, py + 10 + s2 * 2, 2, 2);
    ctx.fillRect(px + 20 - s1 * 2, py + 8 - s2 * 3, 2, 2);
    ctx.fillRect(px + 15, py + 6 + s1 * 2, 2, 2);
  }
}

function drawNPC(x, y, frame) {
  drawPixelChar(x, y, C.npcSkin, '#4A3728', C.npcShirt, '#2A2926', 'down', frame);
  // Floating question mark / exclamation
  var t = performance.now() / 600;
  var floatY = Math.sin(t) * 3;
  ctx.font = 'bold 10px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = C.teal;
  ctx.fillText('!', x * TILE + 16, y * TILE - 6 + floatY);
  ctx.textAlign = 'left';
}

// ============================================================
// RENDER
// ============================================================
function renderRoom() {
  var room = rooms[currentRoom];
  var map = room.map;

  // Floor
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var tile = map[r][c];
      var px = c * TILE;
      var py = r * TILE;

      if (tile === 1) {
        ctx.fillStyle = C.wall;
        ctx.fillRect(px, py, TILE, TILE);
        // Wall detail
        ctx.fillStyle = C.wallHi;
        ctx.fillRect(px, py, TILE, 2);
        ctx.fillRect(px, py, 2, TILE);
      } else if (tile === 2) {
        ctx.fillStyle = C.floor;
        ctx.fillRect(px, py, TILE, TILE);
        // Door frame
        ctx.fillStyle = C.doorFrame;
        ctx.fillRect(px + 2, py, TILE - 4, TILE);
        ctx.fillStyle = C.door;
        ctx.fillRect(px + 6, py + 4, TILE - 12, TILE - 8);
      } else if (tile === 7) {
        ctx.fillStyle = C.floorAlt;
        ctx.fillRect(px, py, TILE, TILE);
        // Tile pattern
        ctx.fillStyle = 'rgba(245,243,238,0.02)';
        ctx.fillRect(px + 1, py + 1, TILE/2 - 1, TILE/2 - 1);
        ctx.fillRect(px + TILE/2, py + TILE/2, TILE/2 - 1, TILE/2 - 1);
      } else {
        ctx.fillStyle = C.floor;
        ctx.fillRect(px, py, TILE, TILE);
        // Subtle grid
        ctx.fillStyle = 'rgba(245,243,238,0.015)';
        ctx.fillRect(px + TILE - 1, py, 1, TILE);
        ctx.fillRect(px, py + TILE - 1, TILE, 1);
      }
    }
  }

  // Draw room decorations on floorAlt tiles
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var tile = map[r][c];
      if (tile === 7) {
        if (currentRoom === 'lab') {
          if ((r === 2 && c === 2) || (r === 2 && c === 3) || (r === 3 && c === 2)) {
            drawDecorObject(c, r, 'beaker', 'lab');
          } else if ((r === 2 && c === 15) || (r === 3 && c === 15)) {
            drawDecorObject(c, r, 'monitor', 'lab');
          } else if ((r === 11 && c === 3) || (r === 12 && c === 16)) {
            drawDecorObject(c, r, 'beaker', 'lab');
          }
        } else if (currentRoom === 'testing') {
          if ((r === 2 && c === 2) || (r === 3 && c === 15)) {
            drawDecorObject(c, r, 'scope', 'testing');
          } else if ((r === 11 && c === 2) || (r === 12 && c === 16)) {
            drawDecorObject(c, r, 'equipment', 'testing');
          }
        } else if (currentRoom === 'audit') {
          if ((r === 2 && c === 2) || (r === 2 && c === 16)) {
            drawDecorObject(c, r, 'stack', 'audit');
          } else if ((r === 11 && c === 2) || (r === 11 && c === 16)) {
            drawDecorObject(c, r, 'cabinet', 'audit');
          }
        }
      }
    }
  }

  // Entities
  var entities = room.entities;
  for (var i = 0; i < entities.length; i++) {
    var e = entities[i];
    if (e.type === 'npc') {
      drawNPC(e.x, e.y, player.frame);
    } else if (e.type === 'chest' && !e.opened) {
      drawChest(e.x, e.y, false);
    } else if (e.type === 'chest' && e.opened) {
      drawChest(e.x, e.y, true);
    } else if ((e.type === 'enemy' || e.type === 'boss') && e.alive) {
      var def = enemyDefs[e.enemyId];
      drawEnemy(e.x, e.y, def.color, e.type === 'boss', e.enemyId);
    }
  }

  // Player
  drawPixelChar(player.x, player.y, C.playerSkin, C.playerHair, C.playerShirt, C.playerPants, player.dir, player.frame);
}

function renderTitle() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, 640, 480);

  // Ambient dots
  var t = performance.now() / 1000;
  for (var i = 0; i < 30; i++) {
    var dx = (Math.sin(t + i * 1.3) * 0.5 + 0.5) * 640;
    var dy = (Math.cos(t * 0.7 + i * 0.9) * 0.5 + 0.5) * 480;
    ctx.fillStyle = 'rgba(198,123,46,' + (0.03 + Math.sin(t + i) * 0.02) + ')';
    ctx.beginPath();
    ctx.arc(dx, dy, 2 + Math.sin(t + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = '700 28px "Space Grotesk", sans-serif';
  ctx.fillStyle = C.amber;
  ctx.fillText('DEVICE QUEST', 320, 160);

  ctx.font = '11px "Inter", sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('A portfolio easter egg by Joneil Caoile', 320, 420);

  ctx.textAlign = 'left';
}

function renderCombatScene() {
  // Render a combat background
  ctx.fillStyle = '#0a0908';
  ctx.fillRect(0, 0, 640, 480);

  // Ground plane
  ctx.fillStyle = C.floor;
  ctx.fillRect(0, 280, 640, 200);
  ctx.fillStyle = C.floorAlt;
  for (var i = 0; i < 20; i++) {
    ctx.fillRect(i * 32, 280, 32, 2);
  }

  // Enemy (draw scaled-up version of the map sprite)
  if (combatEnemy) {
    var isBoss = combatEnemy.maxHp >= 50;
    var scale = isBoss ? 3 : 2.5;
    ctx.save();
    ctx.translate(320 - TILE * scale / 2, 100 - TILE * scale / 2);
    ctx.scale(scale, scale);
    var eid = combatEntityRef ? combatEntityRef.enemyId : 'bug';
    // Draw at tile position 0,0 for the scaled context
    drawEnemy(0, 0, combatEnemy.color || C.enemy1, isBoss, eid);
    ctx.restore();
  }

  // Player sprite (chibi, scaled up in corner)
  ctx.save();
  ctx.translate(70, 280);
  ctx.scale(2, 2);
  drawPixelChar(0, 0, C.playerSkin, C.playerHair, C.playerShirt, C.playerPants, 'right', player.frame);
  ctx.restore();

  // Player HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(60, 370, 110, 14);
  ctx.fillStyle = C.green;
  var hpPct = player.hp / player.maxHp;
  if (hpPct < 0.3) ctx.fillStyle = C.red;
  else if (hpPct < 0.6) ctx.fillStyle = C.gold;
  ctx.fillRect(61, 371, 108 * hpPct, 12);

  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillStyle = C.white;
  ctx.textAlign = 'center';
  ctx.fillText(player.hp + '/' + player.maxHp, 115, 380);
  ctx.textAlign = 'left';
}

// ============================================================
// GAME LOOP
// ============================================================
function render() {
  ctx.clearRect(0, 0, 640, 480);

  updateParticles();
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  if (gameState === STATE.TITLE) {
    renderTitle();
  } else if (gameState === STATE.VICTORY) {
    renderVictory();
  } else if (gameState === STATE.GAMEOVER) {
    renderGameOver();
  } else if (gameState === STATE.COMBAT) {
    renderCombatScene();
  } else {
    renderRoom();
    drawAmbientParticles();
  }

  drawParticles();
  ctx.restore();

  // Fade overlay for room transitions
  if (fadeAlpha > 0) {
    ctx.fillStyle = 'rgba(15,14,12,' + fadeAlpha + ')';
    ctx.fillRect(0, 0, 640, 480);
  }

  requestAnimationFrame(render);
}

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  document.getElementById('hud-hp').textContent = player.hp + '/' + player.maxHp;
  document.getElementById('hud-mp').textContent = player.mp + '/' + player.maxMp;
  document.getElementById('hud-lv').textContent = player.level;
  document.getElementById('hud-room').textContent = rooms[currentRoom].name;
}

function setHUDVisible(v) {
  document.getElementById('hud').classList.toggle('active', v);
}

// ============================================================
// MOVEMENT & INTERACTION
// ============================================================
function canMove(nx, ny) {
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
  var tile = rooms[currentRoom].map[ny][nx];
  if (tile === 1) return false;
  // Check entities blocking
  var entities = rooms[currentRoom].entities;
  for (var i = 0; i < entities.length; i++) {
    var e = entities[i];
    if (e.x === nx && e.y === ny) {
      if (e.type === 'npc') return false;
      if ((e.type === 'enemy' || e.type === 'boss') && e.alive) return false;
      if (e.type === 'chest' && !e.opened) return false;
    }
  }
  return true;
}

function movePlayer(dx, dy) {
  if (gameState !== STATE.EXPLORE) return;

  if (dx < 0) player.dir = 'left';
  else if (dx > 0) player.dir = 'right';
  else if (dy < 0) player.dir = 'up';
  else if (dy > 0) player.dir = 'down';

  var nx = player.x + dx;
  var ny = player.y + dy;

  // Check for door
  var room = rooms[currentRoom];
  for (var i = 0; i < room.doors.length; i++) {
    var d = room.doors[i];
    if (d.x === nx && d.y === ny) {
      fadeDirection = 1;
      setTimeout(function() {
        currentRoom = d.target;
        player.x = d.spawnX;
        player.y = d.spawnY;
        spawnAmbientParticles(currentRoom);
        player.frame++;
        updateHUD();
        showNotification(rooms[currentRoom].name);
      }, 150);
      return;
    }
  }

  if (canMove(nx, ny)) {
    player.x = nx;
    player.y = ny;
    player.frame++;
  } else {
    // Check interaction with adjacent entity
    var entities = room.entities;
    for (var j = 0; j < entities.length; j++) {
      var e = entities[j];
      if (e.x === nx && e.y === ny) {
        interact(e);
        return;
      }
    }
  }
}

function interact(entity) {
  if (entity.type === 'npc') {
    startDialogue(entity.name, entity.lines);
  } else if (entity.type === 'chest' && !entity.opened) {
    openChest(entity);
  } else if ((entity.type === 'enemy' || entity.type === 'boss') && entity.alive) {
    startCombat(entity);
  }
}

function interactFacing() {
  var dx = 0, dy = 0;
  if (player.dir === 'left') dx = -1;
  else if (player.dir === 'right') dx = 1;
  else if (player.dir === 'up') dy = -1;
  else if (player.dir === 'down') dy = 1;

  var tx = player.x + dx;
  var ty = player.y + dy;

  var entities = rooms[currentRoom].entities;
  for (var i = 0; i < entities.length; i++) {
    var e = entities[i];
    if (e.x === tx && e.y === ty) {
      interact(e);
      return;
    }
  }
}

// ============================================================
// CHEST
// ============================================================
function openChest(chest) {
  chest.opened = true;
  var item = chest.item;
  if (item.type === 'buff_atk') {
    player.atk += item.value;
    showNotification('Found ' + item.name + '! ATK +' + item.value, 2200);
  } else if (item.type === 'buff_def') {
    player.def += item.value;
    showNotification('Found ' + item.name + '! DEF +' + item.value, 2200);
  } else {
    player.items.push(item);
    showNotification('Found ' + item.name + '! (' + item.desc + ')', 2200);
  }
}

// ============================================================
// DIALOGUE
// ============================================================
function startDialogue(speaker, lines) {
  gameState = STATE.DIALOGUE;
  dialogueSpeaker = speaker;
  dialogueLines = lines;
  dialogueIndex = 0;
  var box = document.getElementById('dialogue-box');
  box.classList.add('active');
  document.getElementById('dialogue-speaker').textContent = speaker;
  document.getElementById('dialogue-text').textContent = lines[0];
}

function advanceDialogue() {
  dialogueIndex++;
  if (dialogueIndex >= dialogueLines.length) {
    endDialogue();
  } else {
    document.getElementById('dialogue-text').textContent = dialogueLines[dialogueIndex];
  }
}

function endDialogue() {
  gameState = STATE.EXPLORE;
  document.getElementById('dialogue-box').classList.remove('active');
  spawnAmbientParticles(currentRoom);
}

// ============================================================
// COMBAT
// ============================================================
function startCombat(entity) {
  var def = enemyDefs[entity.enemyId];
  combatEnemy = {
    name: def.name,
    hp: def.hp,
    maxHp: def.maxHp,
    atk: def.atk,
    def: def.def,
    xp: def.xp,
    color: def.color,
    attacks: def.attacks
  };
  combatEntityRef = entity;
  combatTurn = 'player';
  combatAnimating = false;

  gameState = STATE.COMBAT;
  setHUDVisible(false);
  if (!isMuted) playAmbientSound(120, 0.08);

  var ui = document.getElementById('combat-ui');
  ui.classList.add('active');
  document.getElementById('enemy-name').textContent = combatEnemy.name;
  updateEnemyHP();
  setCombatMsg(def.intro);
  showCombatActions();
}

function updateEnemyHP() {
  var pct = Math.max(0, combatEnemy.hp / combatEnemy.maxHp) * 100;
  document.getElementById('enemy-hp-bar').style.width = pct + '%';
}

function setCombatMsg(msg) {
  document.getElementById('combat-msg').textContent = msg;
}

function showCombatActions() {
  var acts = document.getElementById('combat-actions');
  acts.innerHTML = '';

  var actions = [
    { label: '1. Attack', key: '1', fn: combatAttack },
    { label: '2. Analyze', key: '2', fn: combatSkill, cost: 8 },
    { label: '3. Item', key: '3', fn: combatItem },
    { label: '4. Run', key: '4', fn: combatRun }
  ];

  for (var i = 0; i < actions.length; i++) {
    (function(action) {
      var btn = document.createElement('button');
      btn.className = 'combat-btn';
      btn.textContent = action.label;
      if (action.cost && player.mp < action.cost) btn.disabled = true;
      if (action.label === '3. Item' && player.items.filter(function(it) { return it.type === 'heal'; }).length === 0) btn.disabled = true;
      btn.addEventListener('click', function() {
        if (!combatAnimating) action.fn();
      });
      acts.appendChild(btn);
    })(actions[i]);
  }
}

function combatAttack() {
  combatAnimating = true;
  var dmg = Math.max(1, player.atk - combatEnemy.def + Math.floor(Math.random() * 4));
  combatEnemy.hp -= dmg;
  if (combatEnemy.hp < 0) combatEnemy.hp = 0;
  updateEnemyHP();
  setCombatMsg('You strike for ' + dmg + ' damage!');
  hideCombatActions();
  spawnFloatingText(320, 120, '-' + dmg, C.coral);
  spawnParticles(320, 140, C.coral, 8);
  shakeScreen(3, 6);

  setTimeout(function() {
    if (combatEnemy.hp <= 0) {
      combatVictory();
    } else {
      enemyTurn();
    }
  }, 900);
}

function combatSkill() {
  if (player.mp < 8) return;
  combatAnimating = true;
  player.mp -= 8;
  var dmg = Math.max(1, Math.floor(player.atk * 1.8) - combatEnemy.def + Math.floor(Math.random() * 3));
  combatEnemy.hp -= dmg;
  if (combatEnemy.hp < 0) combatEnemy.hp = 0;
  updateEnemyHP();
  setCombatMsg('Root Cause Analysis! ' + dmg + ' damage!');
  hideCombatActions();
  spawnFloatingText(320, 110, '-' + dmg, C.blue);
  spawnParticles(320, 140, C.blue, 12, 60);
  shakeScreen(5, 8);

  setTimeout(function() {
    if (combatEnemy.hp <= 0) {
      combatVictory();
    } else {
      enemyTurn();
    }
  }, 900);
}

function combatItem() {
  var healItems = player.items.filter(function(it) { return it.type === 'heal'; });
  if (healItems.length === 0) return;
  combatAnimating = true;

  var item = healItems[0];
  var idx = player.items.indexOf(item);
  player.items.splice(idx, 1);

  player.hp = Math.min(player.maxHp, player.hp + item.value);
  setCombatMsg('Used ' + item.name + '! Restored ' + item.value + ' HP.');
  hideCombatActions();
  spawnFloatingText(115, 330, '+' + item.value, C.green);
  spawnParticles(115, 350, C.green, 8);

  setTimeout(function() {
    enemyTurn();
  }, 900);
}

function combatRun() {
  var isBoss = combatEnemy.maxHp >= 50;
  if (isBoss) {
    setCombatMsg("Can't run from an audit!");
    return;
  }
  combatAnimating = true;
  if (Math.random() > 0.4) {
    setCombatMsg('Got away safely!');
    hideCombatActions();
    setTimeout(function() { endCombat(false); }, 800);
  } else {
    setCombatMsg("Couldn't escape!");
    hideCombatActions();
    setTimeout(function() { enemyTurn(); }, 800);
  }
}

function enemyTurn() {
  var atk = combatEnemy.attacks[Math.floor(Math.random() * combatEnemy.attacks.length)];
  var dmg = Math.max(1, combatEnemy.atk - player.def + Math.floor(Math.random() * 3));
  player.hp -= dmg;
  if (player.hp < 0) player.hp = 0;

  setCombatMsg(combatEnemy.name + ' ' + atk + '! ' + dmg + ' damage!');
  spawnFloatingText(115, 330, '-' + dmg, C.red);
  spawnParticles(115, 350, C.red, 6);
  shakeScreen(4, 5);

  setTimeout(function() {
    if (player.hp <= 0) {
      endCombat(true);
      gameState = STATE.GAMEOVER;
      setHUDVisible(false);
      document.getElementById('combat-ui').classList.remove('active');
    } else {
      combatAnimating = false;
      combatTurn = 'player';
      showCombatActions();
    }
  }, 1000);
}

function combatVictory() {
  player.xp += combatEnemy.xp;
  setCombatMsg(combatEnemy.name + ' defeated! +' + combatEnemy.xp + ' XP');
  combatEntityRef.alive = false;
  spawnParticles(320, 140, C.gold, 20, 80);
  spawnParticles(320, 140, C.amber, 15, 60);
  spawnFloatingText(320, 100, '+' + combatEnemy.xp + ' XP', C.gold);

  // Check level up
  var leveledUp = false;
  while (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.level++;
    player.maxHp += 10;
    player.hp = player.maxHp;
    player.maxMp += 5;
    player.mp = player.maxMp;
    player.atk += 2;
    player.def += 1;
    player.xpNext = Math.floor(player.xpNext * 1.5);
    leveledUp = true;
  }

  setTimeout(function() {
    if (leveledUp) {
      setCombatMsg('Level up! Now level ' + player.level + '! HP and MP restored.');
      setTimeout(function() {
        // Check if boss
        if (combatEntityRef.type === 'boss') {
          endCombat(false);
          gameState = STATE.VICTORY;
          setHUDVisible(false);
        } else {
          endCombat(false);
        }
      }, 1200);
    } else {
      if (combatEntityRef.type === 'boss') {
        endCombat(false);
        gameState = STATE.VICTORY;
        setHUDVisible(false);
      } else {
        endCombat(false);
      }
    }
  }, 1000);
}

function endCombat(died) {
  combatEnemy = null;
  combatAnimating = false;
  document.getElementById('combat-ui').classList.remove('active');
  stopAmbientSound();
  if (!died) {
    gameState = STATE.EXPLORE;
    setHUDVisible(true);
    updateHUD();
    if (!isMuted) playAmbientSound(55, 0.05);
  }
}

function hideCombatActions() {
  document.getElementById('combat-actions').innerHTML = '';
}

// ============================================================
// COMBAT KEY SHORTCUTS
// ============================================================
function handleCombatKey(key) {
  if (combatAnimating) return;
  if (key === '1') combatAttack();
  else if (key === '2' && player.mp >= 8) combatSkill();
  else if (key === '3') combatItem();
  else if (key === '4') combatRun();
}

// ============================================================
// GAME START / RESET
// ============================================================
function startGame() {
  player.x = 3; player.y = 7; player.dir = 'down';
  player.hp = 50; player.maxHp = 50;
  player.mp = 20; player.maxMp = 20;
  player.atk = 8; player.def = 4;
  player.level = 1; player.xp = 0; player.xpNext = 20;
  player.items = [];
  player.frame = 0;
  currentRoom = 'lab';

  // Reset entities
  for (var key in rooms) {
    var entities = rooms[key].entities;
    for (var i = 0; i < entities.length; i++) {
      if (entities[i].type === 'enemy' || entities[i].type === 'boss') entities[i].alive = true;
      if (entities[i].type === 'chest') entities[i].opened = false;
    }
  }

  spawnAmbientParticles(currentRoom);
  initAudio();
  if (!isMuted) playAmbientSound(55, 0.05);
  gameState = STATE.EXPLORE;
  setHUDVisible(true);
  updateHUD();
  showNotification(rooms[currentRoom].name);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', function(e) {
  if (gameState === STATE.TITLE) {
    if (e.key === 'Enter' || e.key === ' ') { startGame(); e.preventDefault(); }
    return;
  }

  if (gameState === STATE.VICTORY || gameState === STATE.GAMEOVER) {
    if (e.key === 'Enter' || e.key === ' ') {
      if (gameState === STATE.GAMEOVER) {
        startGame();
      } else {
        // Return to portfolio
        window.location.href = 'index.html';
      }
      e.preventDefault();
    }
    return;
  }

  if (gameState === STATE.DIALOGUE) {
    if (e.key === 'Enter' || e.key === ' ') { advanceDialogue(); e.preventDefault(); }
    return;
  }

  if (gameState === STATE.COMBAT) {
    handleCombatKey(e.key);
    if (e.key === 'Enter' || e.key === ' ') e.preventDefault();
    return;
  }

  if (gameState === STATE.EXPLORE) {
    var moved = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { movePlayer(0, -1); moved = true; }
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { movePlayer(0, 1); moved = true; }
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { movePlayer(-1, 0); moved = true; }
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { movePlayer(1, 0); moved = true; }
    else if (e.key === 'Enter' || e.key === ' ' || e.key === 'e' || e.key === 'E') { interactFacing(); }
    else if (e.key === 'm' || e.key === 'M') { toggleMute(); }

    if (moved) e.preventDefault();
  }

  if (e.key === 'm' || e.key === 'M') { toggleMute(); }
});

// Mobile d-pad
document.querySelectorAll('.dpad-btn').forEach(function(btn) {
  var dir = btn.getAttribute('data-dir');
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    if (gameState === STATE.TITLE) { startGame(); return; }
    if (gameState === STATE.DIALOGUE) { advanceDialogue(); return; }
    if (gameState === STATE.VICTORY) { window.location.href = 'index.html'; return; }
    if (gameState === STATE.GAMEOVER) { startGame(); return; }
    if (gameState === STATE.EXPLORE) {
      if (dir === 'up') movePlayer(0, -1);
      else if (dir === 'down') movePlayer(0, 1);
      else if (dir === 'left') movePlayer(-1, 0);
      else if (dir === 'right') movePlayer(1, 0);
      else if (dir === 'action') interactFacing();
    }
  });
});

// Mute button
document.getElementById('mute-btn').addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  toggleMute();
});

// ============================================================
// INIT
// ============================================================
render();
