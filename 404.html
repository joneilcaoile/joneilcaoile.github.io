<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Page Not Found | Joneil Caoile</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Joneil Caoile's portfolio.">
  <meta name="author" content="Joneil Caoile">
  <meta name="robots" content="noindex">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';">
  <meta name="theme-color" content="#0F0E0C">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0F0E0C;
      --bg-dark-2: #1A1815;
      --text-white: #FAFAF8;
      --text-muted: #9A9490;
      --amber: #A85A04;
      --amber-light: #FEF3C7;
      --coral: #E05C4A;
      --gold: #C89B3C;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    /* Floating orbs background */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--amber);
      top: -100px; right: -100px;
      animation: float1 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: var(--coral);
      bottom: -80px; left: -80px;
      animation: float2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: var(--gold);
      top: 40%; left: 60%;
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 20px); } }
    @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -30px); } }
    @keyframes float3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-15px, -20px); } }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
    }

    /* Pixel art character */
    .pixel-character {
      margin: 0 auto 2rem;
      image-rendering: pixelated;
      width: 96px;
      height: 96px;
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--amber), var(--coral), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .error-title {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .fun-message {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      opacity: 0.7;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.8rem 1.8rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
      min-width: 44px;
      min-height: 44px;
    }
    .btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

    .btn-primary {
      background: var(--amber);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); background: #915006; }

    .btn-secondary {
      background: var(--bg-dark-2);
      color: var(--text-white);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { transform: translateY(-2px); border-color: var(--amber); }

    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Footer */
    .footer-404 {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.5;
      z-index: 1;
    }
    .footer-404 a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-404 a:hover { color: var(--amber); }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="content">
  <!-- Pixel art character (inline SVG) -->
  <svg class="pixel-character" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="5" y="1" width="6" height="6" rx="0" fill="#A85A04"/>
    <rect x="6" y="3" width="1" height="1" fill="#0F0E0C"/>
    <rect x="9" y="3" width="1" height="1" fill="#0F0E0C"/>
    <rect x="7" y="5" width="2" height="1" fill="#0F0E0C"/>
    <rect x="4" y="7" width="8" height="5" rx="0" fill="#C89B3C"/>
    <rect x="6" y="8" width="1" height="1" fill="#0F0E0C"/>
    <rect x="9" y="8" width="1" height="1" fill="#0F0E0C"/>
    <rect x="7" y="10" width="2" height="1" fill="#A85A04"/>
    <rect x="3" y="8" width="1" height="3" fill="#C89B3C"/>
    <rect x="12" y="8" width="1" height="3" fill="#C89B3C"/>
    <rect x="5" y="12" width="2" height="3" fill="#A85A04"/>
    <rect x="9" y="12" width="2" height="3" fill="#A85A04"/>
    <rect x="13" y="9" width="2" height="2" rx="0" fill="#E05C4A"/>
    <rect x="14" y="11" width="1" height="2" fill="#E05C4A"/>
  </svg>

  <div class="error-code">404</div>
  <h1 class="error-title">This page wandered off.</h1>
  <p class="error-message">Whatever you were looking for isn't here. It might have been moved, renamed, or it never existed in the first place. Either way, the portfolio is right this way.</p>

  <p class="fun-message" id="fun-msg"></p>

  <div class="btn-row">
    <a class="btn btn-primary" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Portfolio
    </a>
    <a class="btn btn-secondary" href="index.html#work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      View Projects
    </a>
  </div>
</main>

<div class="footer-404">
  <a href="https://joneilcaoile.github.io">joneilcaoile.github.io</a>
</div>

<script>
  var msgs = [
    "// Error: page.find() returned undefined",
    "STATUS: 404 — File not found, confidence not lost.",
    "The sensor didn't detect a page here.",
    "This endpoint returned null. Try the homepage.",
    "Looks like this URL failed validation.",
    "No signal detected. Recalibrating..."
  ];
  var el = document.getElementById('fun-msg');
  if (el) el.textContent = msgs[Math.floor(Math.random() * msgs.length)];

  document.addEventListener('visibilitychange', function() {
    document.title = document.hidden
      ? "Come back! The portfolio is this way..."
      : "404 | Page Not Found | Joneil Caoile";
  });
</script>

</body>
</html>
