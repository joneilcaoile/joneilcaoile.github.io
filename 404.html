<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Joneil Caoile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FAFAF8;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 480px; }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            color: #D4A574;
            line-height: 1;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.125rem;
            color: #6b6b6b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #1a1a1a;
            color: #FAFAF8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover { background: #333; }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #FAFAF8; }
            p { color: #a0a0a0; }
            a { background: #FAFAF8; color: #1a1a1a; }
            a:hover { background: #e0e0e0; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>This page doesn't exist. Maybe it moved, maybe it never did.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
