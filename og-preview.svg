<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
      .title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 88px; fill: #F2EDE5; letter-spacing: -0.02em; }
      .subtitle { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; fill: #D97706; letter-spacing: -0.01em; }
      .description { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 28px; fill: #C9BFBB; letter-spacing: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1C1915"/>

  <!-- Amber accent line -->
  <rect x="0" y="0" width="8" height="630" fill="#D97706"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1915;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0D0A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGradient)" opacity="0.6"/>

  <!-- Decorative elements: subtle circles -->
  <circle cx="1100" cy="100" r="120" fill="#D97706" opacity="0.08"/>
  <circle cx="150" cy="550" r="100" fill="#D97706" opacity="0.06"/>

  <!-- Main content -->
  <g>
    <!-- Title -->
    <text x="80" y="200" class="title">Joneil Caoile</text>

    <!-- Subtitle -->
    <text x="80" y="280" class="subtitle">Biomedical Engineer</text>

    <!-- Description -->
    <text x="80" y="360" class="description">M.S. Stevens Institute of Technology</text>

    <!-- Accent dots -->
    <circle cx="80" cy="420" r="5" fill="#D97706"/>
    <circle cx="110" cy="420" r="5" fill="#D97706"/>
    <circle cx="140" cy="420" r="5" fill="#D97706"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#D97706"/>
</svg>
