<meta name="theme-color" content="#0d1117">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     RESET + BASE
     ============================================================ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-faint: #484f58;
    --teal: #14b8a6;
    --teal-dim: rgba(20, 184, 166, 0.15);
    --teal-glow: rgba(20, 184, 166, 0.4);
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --orange: #f97316;
    --coral: #ef4444;
    --gold: #eab308;
    --font: 'Press Start 2P', monospace;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Skip nav */
  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: var(--teal);
    color: var(--bg);
    padding: 8px 16px;
    font-size: 8px;
    z-index: 100;
    text-decoration: none;
  }
  .skip-link:focus { top: 0; }

  /* ============================================================
     BACK LINK
     ============================================================ */
  .back-bar {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-bar a {
    color: var(--text-dim);
    font-size: 8px;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .back-bar a:hover, .back-bar a:focus-visible { color: var(--teal); }

  /* ============================================================
     SCENE (THE STAGE)
     ============================================================ */
  .scene-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 960px;
    padding: 0 16px;
    position: relative;
  }

  .title-block {
    text-align: center;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s ease forwards;
  }
  .title-block h1 {
    font-size: clamp(10px, 2.5vw, 16px);
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1.6;
  }
  .title-block h1 span { color: var(--teal); }
  .title-block p {
    color: var(--text-dim);
    font-size: clamp(6px, 1.5vw, 8px);
    margin-top: 12px;
    letter-spacing: 1px;
  }
  .title-block .hint {
    color: var(--text-faint);
    font-size: 7px;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .stage {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(12px, 3vw, 36px);
    padding-bottom: 32px;
    min-height: 200px;
  }

  /* Ground line */
  .stage::after {
    content: '';
    position: absolute;
    bottom: 30px;
    left: 5%;
    right: 5%;
    height: 2px;
    background: var(--border);
  }

  /* ============================================================
     CHARACTERS
     ============================================================ */
  .char {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: transform 0.2s ease;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .char:nth-child(1) { animation-delay: 0.5s; }
  .char:nth-child(2) { animation-delay: 0.7s; }
  .char:nth-child(3) { animation-delay: 0.9s; }
  .char:nth-child(4) { animation-delay: 1.1s; }
  .char:nth-child(5) { animation-delay: 1.3s; }

  .char:hover, .char:focus-visible { transform: translateY(-6px); }
  .char:focus-visible { outline: 2px solid var(--teal); outline-offset: 4px; border-radius: 4px; }

  .char.active { transform: translateY(-6px); }
  .char.active canvas { filter: drop-shadow(0 0 10px var(--teal-glow)); }
  .char.active .char-name { color: var(--teal); }

  .char.dimmed { opacity: 0.3; filter: grayscale(0.6); pointer-events: none; }

  canvas {
    image-rendering: pixelated;
    display: block;
    transition: filter 0.25s;
  }

  .char-name {
    font-size: clamp(5px, 1.2vw, 7px);
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 8px;
    text-align: center;
    transition: color 0.25s;
    white-space: nowrap;
  }

  /* Idle bob */
  .bob { animation: bob 2.8s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  /* ============================================================
     DIALOGUE BOX
     ============================================================ */
  .dialogue-overlay {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    padding: 0 16px 24px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .dialogue-overlay.open {
    pointer-events: auto;
    opacity: 1;
    transform: translateY(0);
  }

  .dialogue-box {
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px 16px;
    position: relative;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.4);
  }

  .dialogue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .dialogue-speaker {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .speaker-icon {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .speaker-name {
    font-size: 9px;
    letter-spacing: 1px;
  }

  .dialogue-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 7px;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dialogue-close:hover { border-color: var(--teal); color: var(--teal); }

  .dialogue-text {
    font-size: clamp(7px, 1.5vw, 9px);
    line-height: 2;
    color: var(--text);
    min-height: 48px;
    letter-spacing: 0.3px;
  }

  .dialogue-text .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 2px;
    background: var(--teal);
    animation: blink 0.6s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .dialogue-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 8px;
  }

  .dialogue-pages {
    display: flex;
    gap: 6px;
  }
  .dialogue-pages .dot {
    width: 6px;
    height: 6px;
    border-radius: 1px;
    background: var(--border);
    transition: background 0.2s;
  }
  .dialogue-pages .dot.active { background: var(--teal); }
  .dialogue-pages .dot.visited { background: var(--text-faint); }

  .dialogue-advance {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 7px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dialogue-advance:hover { border-color: var(--teal); color: var(--teal); }

  /* ============================================================
     SPARKLES
     ============================================================ */
  .sparkle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    animation: sparkle-up 5s ease-out infinite;
  }
  @keyframes sparkle-up {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    12% { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-90px) scale(0.2); }
  }

  /* ============================================================
     COMPLETION TOAST
     ============================================================ */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--bg2);
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: var(--font);
    font-size: 7px;
    padding: 12px 20px;
    border-radius: 4px;
    z-index: 60;
    opacity: 0;
    transition: all 0.4s ease;
    letter-spacing: 0.5px;
    pointer-events: none;
    text-align: center;
    line-height: 2;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ============================================================
     ANIMATIONS
     ============================================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     REDUCED MOTION
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .bob { animation: none; }
  }

  /* ============================================================
     MOBILE
     ============================================================ */
  @media (max-width: 600px) {
    .stage {
      gap: 8px;
      padding-bottom: 24px;
    }
    .dialogue-box {
      padding: 16px;
    }
    .dialogue-overlay {
      padding: 0 8px 16px;
    }
    .char-name {
      font-size: 5px;
    }
  }

  @media (max-width: 400px) {
    .stage {
      gap: 4px;
    }
  }
</style>
</head>

      if (data[r][c]) {
        ctx.fillStyle = data[r][c];
        ctx.fillRect(c * S, r * S, S, S);
      }
    }
  }
}

charData.forEach((c, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'char';
  wrap.setAttribute('tabindex', '0');
  wrap.setAttribute('role', 'button');
  wrap.setAttribute('aria-label', dialogues[i].name + '. Click to hear their story about ' + dialogues[i].project);
  wrap.dataset.index = i;

  const rows = c.data.length;
  const cols = Math.max(...c.data.map(r => r.length));

  const canvas = document.createElement('canvas');
  canvas.width = cols * S;
  canvas.height = rows * S;
  canvas.style.width = (cols * S) + 'px';
  canvas.style.height = (rows * S) + 'px';
  canvas.className = 'bob';
  canvas.style.animationDelay = (i * 0.4) + 's';
  canvas.setAttribute('aria-hidden', 'true');

  const ctx = canvas.getContext('2d');
  drawSprite(ctx, c.data);

  wrap.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'char-name';
  label.textContent = c.name;
  wrap.appendChild(label);

  // Sparkles
  const sparkColors = [T, GN, PR, BL, OR];
  for (let j = 0; j < 3; j++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.style.background = sparkColors[i];
    sp.style.left = (Math.random() * (cols * S)) + 'px';
    sp.style.bottom = (rows * S + 10 + Math.random() * 20) + 'px';
    sp.style.animationDelay = (Math.random() * 5) + 's';
    wrap.appendChild(sp);
  }

  wrap.addEventListener('click', () => openDialogue(i));
  wrap.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openDialogue(i);
    }
  });

  stage.appendChild(wrap);
  charElements.push(wrap);
});

/* ============================================================
   DIALOGUE ENGINE
   ============================================================ */
const overlay = document.getElementById('dialogueOverlay');
const textEl = document.getElementById('dialogueText');
const nameEl = document.getElementById('speakerName');
const iconEl = document.getElementById('speakerIcon');
const pagesEl = document.getElementById('dialoguePages');
const advBtn = document.getElementById('dialogueAdvance');
const closeBtn = document.getElementById('dialogueClose');
const toastEl = document.getElementById('toast');

let currentChar = -1;
let currentLine = 0;
let typeTimer = null;
let typedLength = 0;
let isTyping = false;
let fullText = '';
const visited = new Set();

function openDialogue(charIndex) {
  currentChar = charIndex;
  currentLine = 0;

  // Highlight active character, dim others
  charElements.forEach((el, i) => {
    el.classList.toggle('active', i === charIndex);
    el.classList.toggle('dimmed', i !== charIndex);
  });

  const d = dialogues[charIndex];
  nameEl.textContent = d.name;
  nameEl.style.color = d.color;
  iconEl.style.background = d.color;

  // Build page dots
  pagesEl.innerHTML = '';
  d.lines.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    pagesEl.appendChild(dot);
  });

  overlay.classList.add('open');
  typeLine(d.lines[0]);
  updateAdvanceButton();
}

function typeLine(text) {
  fullText = text;
  typedLength = 0;
  isTyping = true;
  textEl.innerHTML = '';
  clearInterval(typeTimer);

  typeTimer = setInterval(() => {
    typedLength++;
    textEl.innerHTML = escHTML(fullText.slice(0, typedLength)) + '<span class="cursor-blink"></span>';

    if (typedLength >= fullText.length) {
      clearInterval(typeTimer);
      isTyping = false;
      textEl.innerHTML = escHTML(fullText);
    }
  }, 28);
}

function escHTML(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function advanceDialogue() {
  if (currentChar < 0) return;
  const d = dialogues[currentChar];

  // If still typing, complete instantly
  if (isTyping) {
    clearInterval(typeTimer);
    isTyping = false;
    textEl.innerHTML = escHTML(fullText);
    return;
  }

  // Next line
  if (currentLine < d.lines.length - 1) {
    currentLine++;
    updateDots();
    typeLine(d.lines[currentLine]);
    updateAdvanceButton();
  } else {
    // Finished this character
    visited.add(currentChar);
    closeDialogue();
    checkAllVisited();
  }
}

function updateDots() {
  const dots = pagesEl.querySelectorAll('.dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentLine);
    dot.classList.toggle('visited', i < currentLine);
  });
}

function updateAdvanceButton() {
  const d = dialogues[currentChar];
  if (currentLine >= d.lines.length - 1) {
    advBtn.innerHTML = 'DONE &#10003;';
  } else {
    advBtn.innerHTML = 'NEXT &#9654;';
  }
}

function closeDialogue() {
  overlay.classList.remove('open');
  clearInterval(typeTimer);
  currentChar = -1;

  charElements.forEach(el => {
    el.classList.remove('active', 'dimmed');
  });
}

function checkAllVisited() {
  if (visited.size === dialogues.length) {
    setTimeout(() => {
      showToast("ALL ROLES UNLOCKED<br>One person. Five hats. Zero fluff.");
    }, 500);
  }
}

function showToast(msg) {
  toastEl.innerHTML = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 4000);
}

// Event listeners
advBtn.addEventListener('click', advanceDialogue);
closeBtn.addEventListener('click', closeDialogue);

document.addEventListener('keydown', (e) => {
  if (!overlay.classList.contains('open')) return;

  if (e.key === 'Escape') {
    closeDialogue();
  } else if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault();
    advanceDialogue();
  }
});

// Click outside dialogue box to close
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeDialogue();
});
